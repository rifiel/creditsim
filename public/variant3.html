<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Simulator — Gradient Glass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --grad-start: #667eea;
            --grad-end:   #764ba2;
            --glass-bg:   rgba(255,255,255,0.13);
            --glass-border: rgba(255,255,255,0.22);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.18);
            --text:        #fff;
            --text-muted:  rgba(255,255,255,0.68);
            --text-subtle: rgba(255,255,255,0.45);
            --green:  #4ade80;
            --yellow: #fbbf24;
            --red:    #f87171;
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100%;
        }

        body {
            background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── DECORATIVE ORBS ── */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: #a78bfa;
            top: -120px; right: -80px;
        }
        body::after {
            width: 400px; height: 400px;
            background: #60a5fa;
            bottom: -100px; left: -80px;
        }

        .z1 { position: relative; z-index: 1; }

        /* ── NAV ── */
        .site-nav {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .nav-brand { font-weight: 800; font-size: 1.05rem; color: #fff; letter-spacing: -0.3px; }
        .nav-brand i { margin-right: 6px; opacity: 0.85; }
        .nav-demo-badge {
            background: rgba(255,255,255,0.15);
            border: 1px solid var(--glass-border);
            border-radius: 99px;
            color: var(--text-muted);
            font-size: 0.72rem;
            padding: 3px 12px;
        }
        .back-link { color: rgba(255,255,255,0.75); font-size: 0.8rem; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: #fff; }

        /* ── GLASS CARD ── */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .glass-card-header {
            padding: 1.1rem 1.5rem 0.9rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .glass-card-header .icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .glass-card-header h5 { margin: 0; font-size: 0.95rem; font-weight: 700; color: #fff; }
        .glass-card-header .sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }
        .glass-card-body { padding: 1.5rem; }

        /* ── FORM ── */
        .form-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control, .form-select {
            background: rgba(255,255,255,0.1) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 10px !important;
            color: #fff !important;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(8px);
        }
        .form-control:focus, .form-select:focus {
            border-color: rgba(255,255,255,0.55) !important;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.15) !important;
            background: rgba(255,255,255,0.18) !important;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.38); }
        .form-select option { background: #5b4b8a; color: #fff; }
        .form-text { font-size: 0.73rem; color: var(--text-subtle); margin-top: 4px; }

        /* ── SLIDER ── */
        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .slider-labels .val-center { color: #fff; font-weight: 700; }
        .form-range { accent-color: rgba(255,255,255,0.8); }
        .form-range::-webkit-slider-runnable-track { background: rgba(255,255,255,0.2); }

        /* ── SUBMIT BTN ── */
        .btn-glass-submit {
            background: rgba(255,255,255,0.92);
            color: var(--grad-end);
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            border-radius: 12px;
            padding: 0.7rem 1.5rem;
            letter-spacing: -0.1px;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .btn-glass-submit:hover {
            background: #fff;
            color: var(--grad-end);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.2);
        }
        .btn-glass-submit:active  { transform: translateY(0); }
        .btn-glass-submit:disabled{ opacity: 0.55; cursor: not-allowed; transform: none; }

        /* ── RESULT ── */
        .result-center { text-align: center; padding: 1.5rem 0 1rem; }
        .result-score-num {
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 1;
            color: #fff;
        }
        .result-score-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
        .result-name { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }

        .glass-badge {
            display: inline-block;
            border-radius: 99px;
            padding: 5px 20px;
            font-size: 0.78rem;
            font-weight: 700;
            margin-top: 10px;
        }
        .risk-low    { background: rgba(74,222,128,0.18); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
        .risk-medium { background: rgba(251,191,36,0.18);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
        .risk-high   { background: rgba(248,113,113,0.18); color: var(--red);    border: 1px solid rgba(248,113,113,0.3); }
        .risk-default{ background: rgba(255,255,255,0.1);  color: var(--text-muted); border: 1px solid var(--glass-border); }

        .glass-divider { border-color: var(--glass-border); margin: 1rem 0; }

        .glass-meta-row { display: flex; gap: 1rem; }
        .glass-meta-box {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.85rem;
        }
        .glass-meta-box .m-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
        .glass-meta-box .m-value { font-size: 1rem; font-weight: 700; color: #fff; margin-top: 3px; }

        /* Risk accent */
        .result-low    { border-left: 3px solid var(--green); }
        .result-medium { border-left: 3px solid var(--yellow); }
        .result-high   { border-left: 3px solid var(--red); }

        /* ── ERROR ── */
        .glass-error {
            background: rgba(248,113,113,0.12);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 14px;
            padding: 1.1rem 1.25rem;
        }
        .glass-error .etitle { font-weight: 700; color: var(--red); font-size: 0.9rem; }
        .glass-error .ebody  { font-size: 0.875rem; color: #fca5a5; margin-top: 4px; }

        /* ── PLACEHOLDER ── */
        .glass-placeholder {
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .glass-placeholder i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.45; }

        /* ── SIMULATIONS ── */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }
        .btn-ghost-glass {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            border-radius: 8px;
            font-size: 0.78rem;
            padding: 4px 12px;
            transition: background 0.2s, color 0.2s;
        }
        .btn-ghost-glass:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .sim-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 1rem;
            backdrop-filter: blur(8px);
            transition: background 0.15s, transform 0.15s;
        }
        .sim-card:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .sim-name  { font-weight: 700; font-size: 0.9rem; color: #fff; }
        .sim-score { font-size: 1.5rem; font-weight: 900; color: #fff; }
        .sim-meta  { font-size: 0.72rem; color: var(--text-muted); }
        .sim-loan  { font-weight: 600; font-size: 0.9rem; color: #fff; }

        .empty-state { text-align: center; padding: 2rem 0; color: var(--text-muted); font-size: 0.9rem; }

        /* ── FOOTER ── */
        .site-footer {
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 3rem;
        }
        .d-none { display: none !important; }
    </style>
</head>
<body>
    <nav class="site-nav z1">
        <div class="container">
            <div class="nav-brand"><i class="bi bi-stars"></i>Credit Risk Simulator</div>
            <div class="d-flex align-items-center gap-3">
                <span class="nav-demo-badge">Demo</span>
                <a href="index.html" class="back-link"><i class="bi bi-arrow-left me-1"></i>All Variants</a>
            </div>
        </div>
    </nav>

    <div class="container py-4 z1">
        <div class="row g-4">

            <!-- Form -->
            <div class="col-lg-6">
                <div class="glass-card">
                    <div class="glass-card-header">
                        <div class="icon-wrap"><i class="bi bi-person-fill"></i></div>
                        <div>
                            <h5>Customer Information</h5>
                            <div class="sub">All fields required</div>
                        </div>
                    </div>
                    <div class="glass-card-body">
                        <form id="creditForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="Jane Smith" required>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label for="age" class="form-label">Age</label>
                                    <input type="number" class="form-control" id="age" name="age" min="18" max="120" placeholder="25" required>
                                </div>
                                <div class="col-6">
                                    <label for="annualIncome" class="form-label">Annual Income ($)</label>
                                    <input type="number" class="form-control" id="annualIncome" name="annualIncome" min="0" step="any" placeholder="60000" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label for="debtToIncomeRatio" class="form-label">Debt-to-Income</label>
                                    <input type="number" class="form-control" id="debtToIncomeRatio" name="debtToIncomeRatio" min="0" max="1" step="0.01" placeholder="0.30" required>
                                    <div class="form-text">Decimal — 0.3 = 30%</div>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Loan Amount</label>
                                    <div class="slider-labels">
                                        <span>$5k</span>
                                        <span id="loanAmountDisplay" class="val-center">$15,000</span>
                                        <span>$25k</span>
                                    </div>
                                    <input type="range" class="form-range" id="loanAmount" name="loanAmount"
                                           min="5000" max="25000" step="1000" value="15000" required>
                                    <input type="hidden" id="loanAmountValue" name="loanAmountValue" value="15000">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="creditHistory" class="form-label">Credit History</label>
                                <select class="form-select" id="creditHistory" name="creditHistory" required>
                                    <option value="">Select…</option>
                                    <option value="good">Good</option>
                                    <option value="bad">Bad</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-glass-submit w-100">
                                <i class="bi bi-calculator me-2"></i>Calculate Credit Score
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Results column -->
            <div class="col-lg-6 d-flex flex-column gap-3">

                <!-- Result card -->
                <div id="resultCard" class="glass-card d-none">
                    <div class="glass-card-body">
                        <div class="result-center">
                            <div id="scoreNumber" class="result-score-num">—</div>
                            <div class="result-score-label">Credit Score</div>
                            <div id="riskCategory" class="glass-badge risk-default">—</div>
                            <div id="customerName" class="result-name"></div>
                        </div>
                        <hr class="glass-divider">
                        <div class="glass-meta-row">
                            <div class="glass-meta-box">
                                <div class="m-label">Loan Amount</div>
                                <div id="resultLoanAmount" class="m-value">—</div>
                            </div>
                            <div class="glass-meta-box">
                                <div class="m-label">Annual Income</div>
                                <div id="resultIncome" class="m-value">—</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Error -->
                <div id="errorCard" class="d-none">
                    <div class="glass-error">
                        <div class="etitle"><i class="bi bi-exclamation-octagon me-1"></i>Error</div>
                        <div id="errorMessage" class="ebody"></div>
                    </div>
                </div>

                <!-- Placeholder -->
                <div id="placeholderCard" class="glass-placeholder flex-grow-1">
                    <i class="bi bi-graph-up-arrow"></i>
                    <div>Your result will appear here</div>
                </div>

            </div>
        </div>

        <!-- Simulations -->
        <div class="row mt-5">
            <div class="col-12">
                <div class="section-header">
                    <div class="section-title"><i class="bi bi-clock-history me-1"></i>Previous Simulations</div>
                    <button class="btn-ghost-glass" id="refreshBtn"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
                </div>
                <div id="simulationsList">
                    <div class="empty-state">
                        <i class="bi bi-hourglass-split" style="font-size:1.5rem;display:block;margin-bottom:6px;"></i>
                        Loading…
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer z1">
        <div class="container">
            <i class="bi bi-info-circle me-1"></i>
            Demonstration only — not for production credit decisions.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="variant3Config.js"></script>
    <script src="variantApp.js"></script>
</body>
</html>
