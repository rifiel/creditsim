<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football – CreditSim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="styles/football.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a472a;">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-calculator"></i> CreditSim
      </a>
      <div class="navbar-text text-white-50 ms-auto d-none d-sm-block">
        <i class="bi bi-trophy-fill text-warning me-1"></i> Football Section
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="football-hero" aria-label="Football section hero">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-auto">
          <div class="hero-ball" aria-hidden="true">⚽</div>
        </div>
        <div class="col">
          <h1 class="mb-1">Football</h1>
          <p class="subtitle mb-0">Live fixtures, results, standings &amp; more</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Competition Strip -->
  <div class="competition-strip" id="competitionStrip" aria-label="Competition filter">
    <div class="container d-flex">
      <span class="competition-pill active" data-id="" aria-pressed="true">All</span>
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Tabs -->
  <div class="football-tabs">
    <div class="container">
      <ul class="nav" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="tab-news"     data-tab="news"     role="tab" aria-selected="true">
            <i class="bi bi-newspaper me-1"></i>News
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="tab-results"   data-tab="results"   role="tab" aria-selected="false">
            <i class="bi bi-check2-circle me-1"></i>Results
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="tab-fixtures"  data-tab="fixtures"  role="tab" aria-selected="false">
            <i class="bi bi-calendar3 me-1"></i>Fixtures
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="tab-standings" data-tab="standings" role="tab" aria-selected="false">
            <i class="bi bi-table me-1"></i>Standings
          </button>
        </li>
      </ul>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container my-4">

    <!-- Filter Bar (hidden for standings which has its own selector) -->
    <div class="filter-bar d-flex flex-wrap gap-2 align-items-center" id="filterBar">
      <div>
        <label for="filterFrom" class="form-label mb-0 small text-muted fw-semibold">From</label>
        <input type="date" id="filterFrom" class="form-control form-control-sm" style="max-width:160px;">
      </div>
      <div>
        <label for="filterTo" class="form-label mb-0 small text-muted fw-semibold">To</label>
        <input type="date" id="filterTo" class="form-control form-control-sm" style="max-width:160px;">
      </div>
      <div class="ms-auto">
        <button class="btn btn-sm btn-outline-success" id="btnToday">Today</button>
        <button class="btn btn-sm btn-outline-secondary ms-1" id="btnThisWeek">This week</button>
        <button class="btn btn-sm btn-success ms-1" id="btnApplyFilter">
          <i class="bi bi-funnel-fill"></i> Apply
        </button>
      </div>
    </div>

    <!-- Tab Panels -->
    <div id="panel-news"     role="tabpanel" aria-labelledby="tab-news"></div>
    <div id="panel-results"  role="tabpanel" aria-labelledby="tab-results"  class="d-none"></div>
    <div id="panel-fixtures" role="tabpanel" aria-labelledby="tab-fixtures" class="d-none"></div>
    <div id="panel-standings" role="tabpanel" aria-labelledby="tab-standings" class="d-none"></div>

    <!-- Detail Panel (team / player) -->
    <div id="detailPanel" class="d-none">
      <button class="btn btn-outline-secondary btn-sm mb-3" id="btnBackToTab">
        <i class="bi bi-arrow-left me-1"></i>Back
      </button>
      <div id="detailContent"></div>
    </div>

  </div>

  <footer class="bg-dark text-light text-center py-3 mt-5">
    <div class="container">
      <small>
        <i class="bi bi-info-circle me-1"></i>
        Football data provided by an external feed. For informational purposes only.
      </small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="football.js"></script>
</body>
</html>
