<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Simulator — Professional Dark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-base:   #0f172a;
            --bg-card:   #1e293b;
            --bg-input:  #0f172a;
            --border:    #334155;
            --accent:    #38bdf8;
            --accent-hover: #0ea5e9;
            --text-primary: #f1f5f9;
            --text-muted:   #94a3b8;
            --low:    #22c55e;
            --medium: #f59e0b;
            --high:   #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* ── NAV ── */
        .navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }
        .navbar-brand {
            color: var(--accent) !important;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .navbar-brand i { margin-right: 6px; }
        .nav-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 2px 10px;
        }
        .back-link {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
        }
        .back-link:hover { color: var(--accent); }

        /* ── CARDS ── */
        .dark-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .dark-card-header {
            padding: 1rem 1.25rem 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dark-card-header .card-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1rem;
        }
        .dark-card-header h5 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .dark-card-body { padding: 1.25rem; }

        /* ── FORM ── */
        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .form-control, .form-select {
            background: var(--bg-input) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-primary) !important;
            border-radius: 8px;
            font-size: 0.9rem;
            padding: 0.55rem 0.85rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12) !important;
        }
        .form-control::placeholder { color: #475569; }
        .form-select option { background: var(--bg-card); }
        .form-text { color: #64748b; font-size: 0.75rem; }

        /* ── SLIDER ── */
        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .slider-labels .current-val {
            color: var(--accent);
            font-weight: 700;
        }
        .form-range { accent-color: var(--accent); cursor: pointer; }
        .form-range::-webkit-slider-runnable-track {
            background: var(--border);
            border-radius: 99px;
        }

        /* ── SUBMIT BTN ── */
        .btn-accent {
            background: var(--accent);
            color: #0f172a;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            border-radius: 8px;
            padding: 0.65rem 1.5rem;
            letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-accent:hover { background: var(--accent-hover); color: #fff; transform: translateY(-1px); }
        .btn-accent:active { transform: translateY(0); }
        .btn-accent:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── SCORE RESULT ── */
        .score-display {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }
        .score-sublabel { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .risk-badge {
            display: inline-block;
            border-radius: 99px;
            padding: 4px 16px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .risk-low    { background: rgba(34,197,94,0.12); color: var(--low); border: 1px solid rgba(34,197,94,0.25); }
        .risk-medium { background: rgba(245,158,11,0.12); color: var(--medium); border: 1px solid rgba(245,158,11,0.25); }
        .risk-high   { background: rgba(239,68,68,0.12); color: var(--high); border: 1px solid rgba(239,68,68,0.25); }
        .risk-default{ background: rgba(148,163,184,0.12); color: var(--text-muted); border: 1px solid var(--border); }

        /* ── STAT GRID ── */
        .stat-row {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-box {
            flex: 1;
            background: rgba(56,189,248,0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
        .stat-value { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); margin-top: 2px; }

        /* ── BORDER ACCENT ON CARD ── */
        .dark-card.low-risk    { border-left: 3px solid var(--low); }
        .dark-card.medium-risk { border-left: 3px solid var(--medium); }
        .dark-card.high-risk   { border-left: 3px solid var(--high); }

        /* ── ERROR CARD ── */
        .error-card {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 1.25rem;
        }
        .error-card .error-title { color: var(--high); font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
        .error-card .error-body  { color: #fca5a5; font-size: 0.875rem; }

        /* ── SIMULATIONS LIST ── */
        .sim-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            transition: background 0.15s, transform 0.15s;
        }
        .sim-card:hover { background: rgba(56,189,248,0.05); transform: translateY(-2px); }
        .sim-name { font-weight: 700; font-size: 0.9rem; color: var(--text-primary); }
        .sim-score { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
        .sim-meta  { font-size: 0.72rem; color: var(--text-muted); }
        .sim-loan  { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }

        /* ── SECTION TITLE ── */
        .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); margin-bottom: 1rem; }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 2rem 0; color: var(--text-muted); font-size: 0.9rem; }

        /* ── REFRESH BTN ── */
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.78rem;
            border-radius: 8px;
            padding: 4px 12px;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        /* ── FOOTER ── */
        footer { border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; }
        .d-none { display: none !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-cpu"></i> CREDITSIM
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="nav-badge"><i class="bi bi-shield-check"></i> Demo</span>
                <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> All Variants</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-4">

            <!-- Input Form -->
            <div class="col-lg-6">
                <div class="dark-card">
                    <div class="dark-card-header">
                        <div class="card-icon"><i class="bi bi-person-fill"></i></div>
                        <h5>Customer Information</h5>
                    </div>
                    <div class="dark-card-body">
                        <form id="creditForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Jane Smith" required>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label for="age" class="form-label">Age</label>
                                    <input type="number" class="form-control" id="age" name="age" min="18" max="120" placeholder="25" required>
                                </div>
                                <div class="col-6">
                                    <label for="annualIncome" class="form-label">Annual Income ($)</label>
                                    <input type="number" class="form-control" id="annualIncome" name="annualIncome" min="0" step="any" placeholder="60000" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label for="debtToIncomeRatio" class="form-label">Debt-to-Income Ratio</label>
                                    <input type="number" class="form-control" id="debtToIncomeRatio" name="debtToIncomeRatio" min="0" max="1" step="0.01" placeholder="0.30" required>
                                    <div class="form-text">Decimal — e.g. 0.3 = 30%</div>
                                </div>
                                <div class="col-6">
                                    <label for="loanAmount" class="form-label">Loan Amount</label>
                                    <div class="slider-labels">
                                        <span>$5k</span>
                                        <span id="loanAmountDisplay" class="current-val">$15,000</span>
                                        <span>$25k</span>
                                    </div>
                                    <input type="range" class="form-range" id="loanAmount" name="loanAmount"
                                           min="5000" max="25000" step="1000" value="15000" required>
                                    <input type="hidden" id="loanAmountValue" name="loanAmountValue" value="15000">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="creditHistory" class="form-label">Credit History</label>
                                <select class="form-select" id="creditHistory" name="creditHistory" required>
                                    <option value="">Select...</option>
                                    <option value="good">Good</option>
                                    <option value="bad">Bad</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-accent w-100">
                                <i class="bi bi-calculator me-2"></i>Run Simulation
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Results Column -->
            <div class="col-lg-6 d-flex flex-column gap-4">

                <!-- Result Card -->
                <div id="resultCard" class="dark-card d-none">
                    <div class="dark-card-header">
                        <div class="card-icon"><i class="bi bi-bar-chart-fill"></i></div>
                        <h5>Score Result</h5>
                    </div>
                    <div class="dark-card-body text-center">
                        <div class="score-sublabel mb-2">Credit Score</div>
                        <div id="scoreNumber" class="score-display">—</div>
                        <div id="riskCategory" class="risk-badge risk-default mt-3 mb-2">—</div>
                        <div id="customerName" class="text-muted" style="font-size:0.85rem;"></div>
                        <div class="stat-row">
                            <div class="stat-box">
                                <div class="stat-label">Loan Amount</div>
                                <div id="resultLoanAmount" class="stat-value">—</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Annual Income</div>
                                <div id="resultIncome" class="stat-value">—</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Error Card -->
                <div id="errorCard" class="d-none">
                    <div class="error-card">
                        <div class="error-title"><i class="bi bi-exclamation-octagon me-1"></i>Error</div>
                        <div id="errorMessage" class="error-body"></div>
                    </div>
                </div>

                <!-- Placeholder when no result yet -->
                <div id="placeholderCard" class="dark-card flex-grow-1 d-flex align-items-center justify-content-center" style="min-height:200px;">
                    <div class="text-center" style="color:#475569;">
                        <i class="bi bi-arrow-left-circle" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                        <div style="font-size:0.85rem;">Fill in the form to run a simulation</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Previous Simulations -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="dark-card">
                    <div class="dark-card-header" style="justify-content:space-between;">
                        <div class="d-flex align-items-center gap-2">
                            <div class="card-icon"><i class="bi bi-clock-history"></i></div>
                            <h5 class="mb-0">Previous Simulations</h5>
                        </div>
                        <button class="btn-ghost" id="refreshBtn">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                    </div>
                    <div class="dark-card-body">
                        <div id="simulationsList">
                            <div class="empty-state">
                                <i class="bi bi-hourglass-split" style="font-size:1.5rem; display:block; margin-bottom:6px;"></i>
                                Loading…
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-3 mt-4">
        <div class="container">
            <i class="bi bi-info-circle me-1"></i>
            Demonstration only — not for production credit decisions.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="variant1Config.js"></script>
    <script src="variantApp.js"></script>
</body>
</html>
